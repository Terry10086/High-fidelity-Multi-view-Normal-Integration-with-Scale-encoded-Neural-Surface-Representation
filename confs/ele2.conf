general {
    base_exp_dir = ./exp/CASE_NAME
    recording = [
        ./,
        ./models
        ./encoding
    ]
}

dataset {
    data_dir = /media/yangtongyu/T9/code2/Hash_nerfacc_zip/public_data/CASE_NAME_close1/
    render_cameras_name = cameras_sphere.npz
    object_cameras_name = cameras_sphere.npz
    exclude_views = [0, 5, 10, 15, 20, 25, 32, 33] # [0,4,8,]
    type = normal
    normal_dir = normal_world_space_sdmunips
    height = 800       # 原始尺寸  1440 
    width = 800        # 1920
    exp_time_dir = exp2_c8_wsdf_sdf4
    real_data = False
}

train {
    learning_rate = 5e-4
    learning_rate_alpha = 0.05
    end_iter = 70002
    increase_bindwidth_every = 350  # following neuralangelo's strategy

    batch_size = 4096
    validate_resolution_level = 1
    warm_up_end = 5000
    anneal_end = 0
    use_white_bkgd = False

    save_freq = 5000
    report_freq = 50

    igr_weight = 1
    mask_weight = 1
    normal_weight = 1
    sdf_weight = 4
}

val {
    val_freq = 70000
    val_mesh_freq = 70000
    eval_metric_freq = 1
    val_mesh_res = 512
    val_normal_resolution_level = 1
    report_freq = 100
    save_freq = 10000
}

model {
    neus_renderer {
            set_radius = 0.001
            n_samples = 64
            n_importance = 64
            n_outside = 0
            up_sample_steps = 4     # 1 for simple coarse-to-fine sampling
            perturb = 1.0
        }

    sdf_network {
                d_out = 1,
        d_in = 3,
        d_hidden = 64,
        n_layers = 1,
        skip_in = [-1]  # -1 for no skip connection
        bias = 0.6,
        radius_min = 0.00001,       # 0.00001
        radius_max = 0.0027,     # 0.0027
        geometric_init = True
        weight_norm = True
        input_concat = True  # concat input positions and encoded features
    }

    variance_network {
        init_val = 0.5
    }

    kplanes {
        aabb = [[-1, -1, -1], [1, 1, 1]],
        grid_config = [{
            grid_dimensions= 2,
            input_coordinate_dim= 3,
            output_coordinate_dim= 8,
            resolution= [32, 32, 32, 128]   # x,y,z,t的分辨率
            }],
        concat_features_across_scales =  True,
        multiscale_res =  [1],
        density_activation = trunc_exp,
    }

    
    encoding{
        otype=HashGrid,
		n_levels=14
		n_features_per_level=2
		log2_hashmap_size=19
		base_resolution=32
		per_level_scale=1.3195079107728942
    }
}
